version: '3.8'

services:
  app:
    build: .
    container_name: travel_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - travel
    depends_on:
      - db
      - redis

  web:
    image: nginx:stable
    container_name: travel_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - travel

  db:
    image: mariadb:11
    container_name: travel_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: travel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravelpassword
    command: --default-authentication-plugin=mysql_native_password --skip-host-cache --skip-name-resolve
    ports:
      - "3307:3306"
    networks:
      - travel
    restart: always

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: travel_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - travel

  redis:
    image: redis:7.0
    container_name: travel_redis
    ports:
      - "6379:6379"
    networks:
      - travel

networks:
  travel:
    driver: bridge
