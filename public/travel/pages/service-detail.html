<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Chi tiết dịch vụ - SaigonTeam</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/main.css?v=20260523">
  <link rel="stylesheet" href="../assets/css/pages/service-detail.css?v=20260523-4">
</head>
<body class="page-service-detail" data-base="../">
  <div data-component="top-bar"></div>
  <div data-component="header" data-base="../" data-solid="true"></div>

  <div class="breadcrumb">
    <div class="container">
      <div class="bc-inner">
        <a href="../index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <i class="fas fa-chevron-right"></i>
        <a href="../index.html#services">Dịch vụ</a>
        <i class="fas fa-chevron-right"></i>
        <span class="bc-current" id="bc-name">Chi tiết dịch vụ</span>
      </div>
    </div>
  </div>

  <section class="svc-hero">
    <img class="hero-img" id="hero-img" src="" alt="">
    <div class="hero-overlay"></div>
    <div class="hero-content container">
      <div class="hero-badge" id="hero-badge"></div>
      <h1 class="hero-title" id="hero-title">Đang tải...</h1>
      <p class="hero-sub" id="hero-sub"></p>
    </div>
  </section>

  <div class="qbar">
    <div class="container">
      <div class="qbar-inner" id="qbar-inner"></div>
    </div>
  </div>

  <main class="container">
    <div class="svc-layout">
      <div class="tabs-wrap">
        <div class="tab-bar">
          <button class="tab-btn active" type="button" data-tab="overview">Tổng quan</button>
          <button class="tab-btn" type="button" data-tab="packages">Gói dịch vụ</button>
          <button class="tab-btn" type="button" data-tab="process">Quy trình</button>
          <button class="tab-btn" type="button" data-tab="faq">FAQ</button>
        </div>

        <section class="tab-panel active" id="tab-overview">
          <p class="ov-desc" id="ov-desc"></p>
          <div class="ov-highlights" id="ov-highlights"></div>
          <div class="ov-section-title">Dịch vụ bao gồm</div>
          <div class="include-list" id="inc-list"></div>
        </section>

        <section class="tab-panel" id="tab-packages">
          <div class="pkg-grid" id="pkg-grid"></div>
        </section>

        <section class="tab-panel" id="tab-process">
          <div class="process-steps" id="process-steps"></div>
        </section>

        <section class="tab-panel" id="tab-faq">
          <div class="faq-list" id="faq-list"></div>
        </section>
      </div>

      <aside class="svc-sidebar">
        <div class="svc-sb-card">
          <div class="svc-sb-head">
            <div class="svc-sb-title">Nhận tư vấn</div>
            <div class="svc-sb-sub" id="modal-service-name">SaigonTeam</div>
          </div>
          <div class="svc-sb-body">
            <div class="sb-field">
              <label>Ngày dự kiến</label>
              <input type="date" id="sb-date">
            </div>
            <div class="sb-field">
              <label>Quy mô</label>
              <select id="sb-size">
                <option>10 - 30 người</option>
                <option>30 - 100 người</option>
                <option>100 - 300 người</option>
                <option>300+ người</option>
              </select>
            </div>
            <button class="sb-btn" type="button" id="btn-open-modal"><i class="fas fa-paper-plane"></i> Yêu cầu báo giá</button>
            <div class="sb-divider">hoặc</div>
            <button class="sb-consult" type="button" id="btn-consult"><i class="fas fa-phone"></i> Tư vấn nhanh</button>
            <div class="sb-hotline">
              <div class="sb-hotline-ico"><i class="fas fa-phone-alt"></i></div>
              <div>
                <div class="sb-hotline-num">0908.940.903</div>
                <div class="sb-hotline-lbl">Hotline hỗ trợ</div>
              </div>
            </div>
          </div>
        </div>
        <div class="trust-card">
          <div class="trust-item"><i class="fas fa-check-circle"></i> Báo giá rõ ràng</div>
          <div class="trust-item"><i class="fas fa-headset"></i> Hỗ trợ 24/7</div>
          <div class="trust-item"><i class="fas fa-shield-alt"></i> Hợp đồng minh bạch</div>
        </div>
      </aside>
    </div>

    <section class="svc-related">
      <h2 class="svc-rel-title">Dịch vụ liên quan</h2>
      <div class="svc-rel-grid" id="rel-grid"></div>
    </section>
  </main>

  <div class="svc-modal" id="modal">
    <div class="svc-modal-box">
      <div class="svc-modal-hd">
        <div class="svc-modal-hd-title">Yêu cầu tư vấn</div>
        <button class="svc-modal-close" type="button" aria-label="Đóng"><i class="fas fa-times"></i></button>
      </div>
      <div class="svc-modal-body" id="modal-content">
        <div class="mf-row"><label>Họ và tên</label><input type="text" placeholder="Nguyễn Văn A"></div>
        <div class="mf-row"><label>Số điện thoại</label><input type="tel" placeholder="0908 940 903"></div>
        <div class="mf-row"><label>Dịch vụ</label><input type="text" id="modal-service-input" readonly></div>
        <div class="mf-row"><label>Ngày dự kiến</label><input type="date" id="modal-date"></div>
        <div class="mf-row"><label>Nhu cầu</label><textarea placeholder="Mô tả ngắn nhu cầu của bạn"></textarea></div>
        <button class="mf-submit" type="button" id="btn-submit">Gửi yêu cầu</button>
      </div>
    </div>
  </div>

  <div data-component="footer" data-base="../"></div>
  <div data-component="float-social"></div>

  <script src="../assets/js/components/toast.js"></script>
  <script src="../assets/js/components/lightbox.js"></script>
  <script src="../assets/js/components/top-bar.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/components/footer.js"></script>
  <script src="../assets/js/components/float-social.js"></script>
  <script src="/travel-data/services.js"></script>
  <script src="../assets/js/pages/service-detail.js?v=20260523-2"></script>
  <script src="../assets/js/main.js?v=20260523"></script>
</body>
</html>
