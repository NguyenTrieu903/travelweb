<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh Sách Tour — SaigonTeam</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/pages/tour-list.css">
</head>
<body class="page-tour-list">

  <div data-component="top-bar"></div>
  <div data-component="header" data-base="../" data-solid="true"></div>

  <div class="breadcrumb">
    <div class="container">
      <div class="bc-inner">
        <a href="../index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <i class="fas fa-chevron-right"></i>
        <a href="../index.html#destinations">Điểm đến</a>
        <i class="fas fa-chevron-right"></i>
        <span class="bc-current" id="bc-dest">Danh sách tour</span>
      </div>
    </div>
  </div>

  <div class="list-hero">
    <div class="container list-hero-inner">
      <div class="list-hero-tag"   id="hero-tag">Khám Phá Điểm Đến</div>
      <h1 class="list-hero-title"  id="hero-title">Tour Du Lịch</h1>
      <p class="list-hero-sub"     id="hero-sub">Khởi hành từ TP. Hồ Chí Minh — bay thẳng, khách sạn đỉnh, trải nghiệm đáng nhớ</p>
      <div class="list-hero-stats">
        <div class="lhs-item"><i class="fas fa-map-marker-alt"></i> <span id="stat-dest">Điểm đến</span></div>
        <div class="lhs-item"><i class="fas fa-suitcase"></i> <span id="stat-count">0 tour khả dụng</span></div>
        <div class="lhs-item"><i class="fas fa-plane-departure"></i> Khởi hành từ TP. Hồ Chí Minh</div>
      </div>
    </div>
  </div>

  <div class="filter-bar">
    <div class="container filter-bar-inner">
      <span class="fb-label">Lọc:</span>
      <div class="fb-chips" id="filterChips">
        <button type="button" class="fb-chip active" data-filter="all">Tất cả</button>
        <button type="button" class="fb-chip"        data-filter="3n2d">3 Ngày 2 Đêm</button>
        <button type="button" class="fb-chip"        data-filter="4n3d">4 Ngày 3 Đêm</button>
        <button type="button" class="fb-chip"        data-filter="vietkieu">Việt Kiều</button>
        <button type="button" class="fb-chip"        data-filter="sale">Ưu Đãi</button>
      </div>
      <div class="fb-sort">
        <span>Sắp xếp:</span>
        <select id="sortSelect">
          <option value="default">Mặc định</option>
          <option value="price-asc">Giá tăng dần</option>
          <option value="price-desc">Giá giảm dần</option>
        </select>
      </div>
    </div>
  </div>

  <div class="list-main">
    <div class="container">
      <p class="list-count" id="listCount"></p>
      <div class="tour-grid" id="tourGrid"></div>
      <div class="no-results is-hidden" id="noResults">
        <i class="fas fa-search"></i>
        <p>Không tìm thấy tour phù hợp với bộ lọc này.</p>
      </div>
    </div>
  </div>

  <div data-component="footer" data-base="../"></div>
  <div data-component="float-social"></div>

  <script src="../assets/js/components/toast.js"></script>
  <script src="../assets/js/components/lightbox.js"></script>
  <script src="../assets/js/components/top-bar.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/components/footer.js"></script>
  <script src="../assets/js/components/float-social.js"></script>
  <script src="/travel-data/tours.js"></script>
  <script src="../assets/js/pages/tour-list.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
